apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipeline
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/DurojaiyeAbisoye/kubeflow-argocd.git
    targetRevision: main
    path: applications/pipeline/upstream/env/platform-agnostic-multi-user
  destination:
    server: https://kubernetes.default.svc
  ignoreDifferences:
  - group: apps
    kind: StatefulSet
    name: metacontroller
    jsonPointers:
      - /metadata/labels/application-crd-id
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
