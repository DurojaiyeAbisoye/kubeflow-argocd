apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml

patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: argocd-cm
      namespace: argocd

images:
  - name: quay.io/argoproj/argocd
    newTag: v3.3.9
  - name: ghcr.io/dexidp/dex
    newTag: v2.45.1
  - name: redis
    newTag: 8.8.0-alpine
  - name: haproxy
    newTag: 3.3.6-alpine